<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro | IT Test Platform</title>
    <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    /* Негізгі фонды ақшыл сұр немесе таза ақ қылу */
    body { 
        font-family: 'Segoe UI', Tahoma, sans-serif; 
        background: #f8fafc; /* Өте ақшыл фон */
        color: #1e293b; /* Мәтін түсі қою */
        min-height:100vh; 
        display:flex; 
        justify-content:center; 
        align-items:center; 
        padding:20px; 
    }

    /* Контейнер түсі ақ */
    .app-container { 
        max-width:900px; 
        width:100%; 
        background:#ffffff; 
        border-radius:24px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        padding:30px; 
    }

    .screen { transition:all 0.3s ease; }
    .hidden { display:none; }
    
    header { text-align:center; margin-bottom:30px; }
    
    /* Тақырып түсін көкшіл градиент қалдырамыз */
    h1 { 
        font-size:2.5rem; 
        background:linear-gradient(135deg, #2563eb, #7c3aed); 
        -webkit-background-clip:text; 
        -webkit-text-fill-color:transparent; 
        margin-bottom:10px; 
    }

    .menu-card h3 { text-align:center; margin-bottom:20px; color:#475569; }

    /* Батырмалар стилі */
    .grid-menu { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:15px; }
    .grid-menu button { 
        background:#eff6ff; 
        border:1px solid #dbeafe;
        padding:15px; 
        border-radius:16px; 
        color:#2563eb; 
        font-size:1.1rem; 
        font-weight:bold; 
        cursor:pointer; 
        transition:all 0.2s; 
    }
    .grid-menu button:hover { background:#dbeafe; transform:translateY(-2px); }

    .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; color: #64748b; }
    
    /* Прогресс бар */
    .progress-bar { flex:1; height:10px; background:#f1f5f9; border-radius:10px; overflow:hidden; }
    #bar-fill { width:0%; height:100%; background:linear-gradient(90deg, #3b82f6, #8b5cf6); transition:width 0.3s; }

    /* Сұрақ блогы */
    #question-box { background:#f8fafc; border-radius:20px; padding:25px; margin:20px 0; border: 1px solid #e2e8f0; }
    #q-text { font-size:1.4rem; margin-bottom:25px; line-height:1.4; color: #1e293b; }

    /* Жауап нұсқалары */
    .options-grid { display:flex; flex-direction:column; gap:12px; }
    .option-item { 
        background:#ffffff; 
        padding:14px 20px; 
        border-radius:14px; 
        cursor:pointer; 
        transition:all 0.2s; 
        border:1px solid #e2e8f0; 
        color: #475569;
    }
    .option-item:hover { background:#f1f5f9; border-color:#3b82f6; }

    /* Дұрыс/бұрыс жауаптар түсі */
    .option-item.correct { background:#d1fae5 !important; border-color:#10b981 !important; color: #065f46 !important; }
    .option-item.wrong { background:#fee2e2 !important; border-color:#ef4444 !important; color: #991b1b !important; }

    .quiz-footer { display:flex; justify-content:center; margin-top:20px; }
    #next-btn { background:linear-gradient(135deg, #3b82f6, #8b5cf6); border:none; padding:12px 32px; border-radius:40px; color:white; font-size:1.1rem; font-weight:bold; cursor:pointer; transition:transform 0.2s; }
    
    .result-card { text-align:center; padding:20px; }
    .score-circle { width:150px; height:150px; background:linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:30px auto; font-size:3rem; font-weight:bold; color:white; }
    
    .result-card button { background:#f1f5f9; border:1px solid #e2e8f0; padding:12px 24px; border-radius:30px; color:#475569; font-size:1rem; cursor:pointer; margin-top:20px; }
    
    @media (max-width:600px) { .app-container { padding:20px; } .grid-menu { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div class="app-container">

мандасы қолданылады"]}, {"id": 297, "question": "SQL-де топталған деректерге шарт қолдану үшін не пайдаланылады?", "correct": "HAVING операторы", "variants": ["VIEW шарттары", "UNION шарттары", "HAVING операторы", "GROUP BY операторлары", "ORDER BY шектеуі"]}, {"id": 298, "question": "SQL-де кестедегі мәнді өзгерту үшін не қолданылады?", "correct": "Кестедегі мәндерді өзгерту үшін  UPDATE операторы қолданылады", "variants": ["Кестедегі өріс атауын өзгерту үшін  RENAME FIELD операторы қолданылады", "Кестедегі мәндерді өзгерту үшін  UPDATE операторы қолданылады", "Кестедегі дерек мәндерін өзгерту үшін  MODIFY VALUE әдісі қолданылады", "Кесте бағандарын өзгерту үшін  ALTER COLUMN операторы пайдаланылады", "Кесте құрылымын өзгерту үшін  SET STRUCTURE операциясы орындалады"]}, {"id": 299, "question": "SQL-де жаңа кесте жасау үшін не қажет?", "correct": "Жаңа кесте құру үшін CREATE TABLE командасы қолданылады", "variants": ["Жаңа жазбаларды қосу үшін INSERT INTO командасы қолданылады", "Жаңа кесте сипаттау үшін DECLARE TABLE әдісі пайдаланылады", "Жаңа кесте құру үшін CREATE TABLE командасы қолданылады", "Кесте құрылымын орнату үшін SETUP STRUCTURE тәсілі қолданылады", "Жаңа кесте құру үшін MAKE NEW TABLE командасы пайдаланылады"]}, {"id": 300, "question": "SQL-де жазбаны жою үшін қандай команда қолданылады?", "correct": "Кестеден жазбаны жою үшін DELETE FROM командасы пайдаланылады", "variants": ["Кестеден деректерді жою үшін DROP FROM кесте тәсілі қолданылады", "Кестедегі жазбаларды тазарту үшін CLEAR ENTRY командасы қолданылады", "Кестеден жазбаны жою үшін DELETE FROM командасы пайдаланылады", "Кестеден жолдарды өшіру үшін ERASE ROW әдісі пайдаланылады", "Кестеден жазбаны өшіру үшін REMOVE RECORD командасы пайдаланылады"]}];
const BLOCK_SIZE = 50;
    const TOTAL_BLOCKS = Math.ceil(quizData.length / BLOCK_SIZE);
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let userAnswers = [];

    function buildBlockButtons() {
        const container = document.getElementById('block-list');
        container.innerHTML = '';
        for (let i = 0; i < TOTAL_BLOCKS; i++) {
            const start = i * BLOCK_SIZE + 1;
            const end = Math.min((i+1)*BLOCK_SIZE, quizData.length);
            const btn = document.createElement('button');
            btn.textContent = `${start} - ${end}`;
            btn.onclick = () => initQuiz(i);
            container.appendChild(btn);
        }
    }

    function initQuiz(blockIdx) {
        const start = blockIdx * BLOCK_SIZE;
        const end = Math.min(start + BLOCK_SIZE, quizData.length);
        currentQuestions = [];
        for (let i = start; i < end; i++) {
            const q = quizData[i];
            const shuffledVariants = [...q.variants].sort(() => Math.random() - 0.5);
            currentQuestions.push({
                id: q.id,
                text: q.question,
                correct: q.correct,
                variants: shuffledVariants
            });
        }
        currentIndex = 0;
        score = 0;
        userAnswers = new Array(currentQuestions.length).fill(null);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('progress-text').innerText = `Сұрақ: ${currentIndex+1}/${currentQuestions.length}`;
        const percent = ((currentIndex+1) / currentQuestions.length) * 100;
        document.getElementById('bar-fill').style.width = `${percent}%`;
        
        const container = document.getElementById('options-list');
        container.innerHTML = '';
        const saved = userAnswers[currentIndex];
        
        q.variants.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerText = opt;
            if (saved !== null) {
                if (opt === q.correct) div.classList.add('correct');
                else if (opt === saved) div.classList.add('wrong');
                div.style.pointerEvents = 'none';
            } else {
                div.onclick = () => checkAnswer(div, opt, q.correct);
            }
            container.appendChild(div);
        });
        
        const nextBtn = document.getElementById('next-btn');
        if (saved !== null) nextBtn.classList.remove('hidden');
        else nextBtn.classList.add('hidden');
    }

    function checkAnswer(element, selected, correct) {
        const allOptions = document.querySelectorAll('.option-item');
        allOptions.forEach(el => el.style.pointerEvents = 'none');
        if (selected === correct) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('wrong');
            allOptions.forEach(el => {
                if (el.innerText === correct) el.classList.add('correct');
            });
        }
        userAnswers[currentIndex] = selected;
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function loadNextQuestion() {
        if (currentIndex + 1 < currentQuestions.length) {
            currentIndex++;
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score}/${currentQuestions.length}`;
        let percent = (score / currentQuestions.length) * 100;
        let msg = "";
        if (percent >= 90) msg = "Тамаша! Сіз нағыз мамансыз! 🎉";
        else if (percent >= 70) msg = "Жақсы нәтиже! Бірақ әлі де дамуға орын бар 💪";
        else if (percent >= 50) msg = "Қанағаттанарлық. Қайталап көріңіз 📚";
        else msg = "Көбірек дайындалыңыз. Бұл сіздің деңгейіңіз емес 😢";
        document.getElementById('result-message').innerText = msg;
    }

    function restartQuiz() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }

    buildBlockButtons();
</script>
